name: kernel

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cortex-kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Golden fixtures are in sync with the frozen artifact
        run: |
          npm run golden:regen
          git diff --exit-code -- test/golden/fixtures
      - name: Packed artifact contains the built library and imports cleanly
        run: npm run pack:smoke
      - run: npm test
